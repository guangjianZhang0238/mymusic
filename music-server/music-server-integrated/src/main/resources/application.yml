server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    # 避免上传请求在连接层被提前中断（status=0 / EOF）
    connection-timeout: 600000  # 10分钟
    max-swallow-size: -1
    max-http-form-post-size: -1
    keep-alive-timeout: 600000  # 10分钟
    accept-count: 100
    max-connections: 8192

spring:
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
  application:
    name: music-server
  
  # 字符编码配置
  charset: UTF-8
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/music_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true&useUnicode=true&connectionCharset=utf8mb4&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&initialTimeout=2
    username: root
    password: 43ae1ff64991
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池基本配置
      minimum-idle: 10
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      # 连接测试配置
      validation-timeout: 5000
      leak-detection-threshold: 60000
      # 连接属性
      connection-test-query: SELECT 1
      # 性能优化
      pool-name: MusicHikariCP
      auto-commit: true
  
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    password: Guangjian38+++
    timeout: 5000
    client-name: music-server
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
        max-wait: 3000
        time-between-eviction-runs: 60000
      shutdown-timeout: 200
  
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
      # 指定上传临时目录，避免默认 temp 目录权限/空间问题导致 multipart 解析失败
      location: ${music.storage.temp-path}
      # 增加超时时间配置
      file-size-threshold: 0
      resolve-lazily: false
    async:
      request-timeout: 600000  # 10分钟

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.music.*.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 关闭 MyBatis SQL 控制台输出
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

music:
  miniprogram:
    appid: wx51470b9b69486d97
    secret: 67d917c2084326841365dd6d520db990
  storage:
    # 数据根目录，可以是绝对路径或相对路径（相对于应用启动目录）
    # Windows 示例：D:/mymusic-data
    # Linux  示例：/data/mymusic
    # 相对路径示例（推荐开发环境使用）：data
    data-root-url: C:/project/exercises/mymusic/data_folder
    # 在数据根目录下的业务存储根目录、临时目录和用户文件目录（相对路径）
    base-path: music_source
    temp-path: music_temp
    user-path: user_files
    # 单个文件最大上传大小（字节）。2GB
    max-file-size: 2147483648
  
  # 上传/扫描时 WAV、DSF 自动转码为 FLAC（失败则尝试 AAC）
  transcoding:
    ffmpeg:
      # 默认使用系统 PATH 中的 ffmpeg；可用环境变量 FFMPEG_PATH 或此处配置绝对路径（如 Windows: C:/ffmpeg/bin/ffmpeg.exe）
      path: ${FFMPEG_PATH:ffmpeg}
    delete-source: true
    # 为 true 时，上传与扫描中的 WAV/DSF 会自动转码
    auto-transcode: true
  
  jwt:
    secret: music-player-jwt-secret-key-must-be-at-least-256-bits
    expiration: 7200000

logging:
  level:
    root: info
    com.music: info
    com.zaxxer.hikari: warn
    org.springframework.jdbc: warn
    org.mybatis: warn
  # 日志编码配置
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/music-server.log
    max-size: 10MB
    max-history: 30

lyrics:
  path: https://api.lrc.cx/lyrics
  songName: title
  singerName: artistName
lyrics2:
  path: https://oiapi.net/api/QQMusicLyric
  songName: keyword

# 搜歌词api示例
# https://oiapi.net/api/QQMusicLyric?keyword=%E7%88%B1%E6%98%AF%E4%BB%80%E4%B9%88&id=105419532
# https://api.lrc.cx/lyrics?title=%E7%9B%B8%E6%80%9D%E9%A3%8E%E9%9B%A8%E4%B8%AD&artistName=%E5%BC%A0%E5%AD%A6%E5%8F%8B